name: Validate fonts

on:
  push:
    paths:
      - "packages/**/fonts/**"
      - "tests/**"
      - ".github/workflows/validate-fonts.yml"
  pull_request:
    paths:
      - "packages/**/fonts/**"
      - "tests/**"
      - ".github/workflows/validate-fonts.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv
        uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
      - name: Validate every OTF/TTF master
        run: uv run --with fonttools --with pytest pytest tests/test_fonts.py -q
